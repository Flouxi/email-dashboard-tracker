<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Manifest — Send Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1220;
    --panel:#121B2E;
    --panel-2:#182238;
    --line:#26324A;
    --paper:#EDE7D9;
    --wax:#B3401F;
    --wax-dim:#7A2C15;
    --ok:#4FA98B;
    --muted:#7C8AA5;
    --text:#E8E9EE;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:var(--ink);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:40px 28px 80px}

  header{
    display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:1px solid var(--line);
    padding-bottom:24px;margin-bottom:36px;
    gap:20px;flex-wrap:wrap;
  }
  .brand-eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin-bottom:6px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;font-size:34px;margin:0;
    letter-spacing:-0.01em;
  }
  .toolbar{display:flex;gap:10px;align-items:center;}
  select,input[type=text]{
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    padding:9px 12px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12.5px;
  }
  button{
    background:var(--wax);color:#fff;border:none;padding:9px 16px;border-radius:6px;
    font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.03em;cursor:pointer;
  }
  button:hover{background:var(--wax-dim)}

  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:40px;}
  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
  .stat{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:20px 20px 18px;position:relative;overflow:hidden;
  }
  .stat .label{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--muted);margin-bottom:10px;
  }
  .stat .value{font-family:'Fraunces',serif;font-size:36px;font-weight:600;}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:4px;}

  /* signature element: postmark stamp for open rate */
  .postmark{
    position:absolute;top:14px;right:14px;width:64px;height:64px;
    border:2px solid var(--wax);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    transform:rotate(-8deg);opacity:.9;
  }
  .postmark::before{
    content:'';position:absolute;inset:6px;border:1px dashed var(--wax);border-radius:50%;
  }
  .postmark span{
    font-family:'JetBrains Mono',monospace;font-weight:600;font-size:15px;color:var(--wax);
  }

  .panel{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;
  }
  .panel-head{
    padding:16px 20px;border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;
  }
  .panel-head h2{
    font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin:0;
  }
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{
    text-align:left;font-family:'JetBrains Mono',monospace;font-size:10.5px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    padding:12px 20px;border-bottom:1px solid var(--line);
  }
  tbody td{padding:12px 20px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--panel-2)}
  .email-cell{font-family:'JetBrains Mono',monospace;font-size:12.5px;}
  .badge{
    display:inline-flex;align-items:center;gap:6px;
    font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 9px;border-radius:20px;
  }
  .badge.opened{background:rgba(79,169,139,.15);color:var(--ok);}
  .badge.pending{background:rgba(124,138,165,.15);color:var(--muted);}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
  .count{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:12px;}
  .empty{padding:60px 20px;text-align:center;color:var(--muted);}
  .empty .big{font-family:'Fraunces',serif;font-size:20px;color:var(--text);margin-bottom:6px;}
  .key-gate{
    max-width:420px;margin:120px auto;text-align:center;
  }
  .key-gate input{width:100%;margin:16px 0;text-align:center;}
  footer{margin-top:28px;text-align:center;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="empty" style="margin-top:120px">Loading manifest…</div>
</div>

<script>
const API_KEY_STORAGE = 'tracking_dashboard_key';

function fmtDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' · ' +
         d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}

let currentView = 'opens'; // 'opens' = Belkorchi's built-in pixel data (default) | 'advanced' = token-based link tracking

async function apiFetch(path){
  const key = localStorage.getItem(API_KEY_STORAGE) || '';
  const res = await fetch(path + (path.includes('?') ? '&' : '?') + 'key=' + encodeURIComponent(key));
  if(res.status === 401) throw new Error('unauthorized');
  return res.json();
}

function renderKeyGate(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="key-gate">
      <div class="brand-eyebrow">Manifest</div>
      <h1>Enter dashboard key</h1>
      <input type="text" id="keyInput" placeholder="dashboard secret" />
      <button onclick="submitKey()">Unlock</button>
    </div>`;
}

function submitKey(){
  const val = document.getElementById('keyInput').value.trim();
  localStorage.setItem(API_KEY_STORAGE, val);
  boot();
}

function statCard(label, value, sub, stamp){
  return `
    <div class="stat">
      ${stamp ? `<div class="postmark"><span>${stamp}</span></div>` : ''}
      <div class="label">${label}</div>
      <div class="value">${value}</div>
      <div class="sub">${sub || ''}</div>
    </div>`;
}

function viewToggle(){
  return `
    <div class="toolbar" style="margin-right:12px">
      <select id="viewSelect">
        <option value="opens" ${currentView==='opens' ? 'selected' : ''}>Belkorchi Opens</option>
        <option value="advanced" ${currentView==='advanced' ? 'selected' : ''}>Advanced (links/clicks)</option>
      </select>
    </div>`;
}

function hourlyChartSvg(hourly){
  const w = 680, h = 150, padL = 28, padB = 20, padT = 10;
  const max = Math.max(1, ...hourly.map(p => p.count));
  const stepX = (w - padL - 10) / (hourly.length - 1);
  const scaleY = (h - padT - padB) / max;
  const pts = hourly.map((p, i) => {
    const x = padL + i * stepX;
    const y = h - padB - p.count * scaleY;
    return [x, y];
  });
  const linePath = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  const areaPath = linePath + ` L${pts[pts.length-1][0]},${h-padB} L${pts[0][0]},${h-padB} Z`;
  const gridLines = [0,1,2,3].map(i => {
    const y = padT + (i * (h - padT - padB) / 3);
    return `<line x1="${padL}" y1="${y}" x2="${w-10}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`;
  }).join('');
  const labels = [0,6,12,18,23].map(h_i => {
    const x = padL + h_i * stepX;
    return `<text x="${x}" y="${h-4}" font-family="JetBrains Mono, monospace" font-size="9" fill="var(--muted)" text-anchor="middle">${String(h_i).padStart(2,'0')}h</text>`;
  }).join('');
  return `
  <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;overflow:visible">
    ${gridLines}
    <path d="${areaPath}" fill="var(--wax)" opacity="0.12"/>
    <path d="${linePath}" fill="none" stroke="var(--wax)" stroke-width="2"/>
    ${pts.map(p => `<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="var(--wax)"/>`).join('')}
    ${labels}
  </svg>`;
}

function barList(items, key, labelKey){
  const max = Math.max(1, ...items.map(i => i.count));
  if(!items.length) return `<div class="empty" style="padding:24px">No data yet</div>`;
  return items.map(i => `
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span class="email-cell">${i[labelKey]}</span>
        <span class="count">${i.count}</span>
      </div>
      <div style="background:var(--panel-2);border-radius:4px;height:6px;overflow:hidden">
        <div style="background:var(--wax);height:100%;width:${(i.count/max*100).toFixed(0)}%"></div>
      </div>
    </div>`).join('');
}

let allLogs = [];

function renderOpens(data){
  const s = data.summary;
  const app = document.getElementById('app');
  allLogs = data.logs;

  app.innerHTML = `
    <header>
      <div>
        <div class="brand-eyebrow">Manifest · Belkorchi Tracking</div>
        <h1>Email Tracker</h1>
      </div>
      <div class="toolbar">
        ${viewToggle()}
        <button onclick="boot()">Refresh</button>
      </div>
    </header>

    <div class="grid">
      ${statCard('Total Opens', s.totalOpens, 'all-time events')}
      ${statCard('Unique Emails', s.uniqueEmails, 'tracked recipients')}
      ${statCard('Unique IPs', s.uniqueIps, 'unique visitors')}
      <div class="stat">
        <div class="label">Recent Activity</div>
        <div class="value" style="font-size:22px">${s.recentActive ? 'Active' : 'Idle'}</div>
        <div class="sub"><span class="badge ${s.recentActive ? 'opened' : 'pending'}"><span class="dot"></span>${s.lastEventAt ? fmtDate(s.lastEventAt) : 'No events yet'}</span></div>
      </div>
    </div>

    <div class="panel" style="margin-bottom:16px">
      <div class="panel-head"><h2>Statistics — opens today by hour</h2></div>
      <div style="padding:16px 20px">${hourlyChartSvg(data.hourly)}</div>
    </div>

    <div class="grid" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
      <div class="panel">
        <div class="panel-head"><h2>Top Countries</h2></div>
        <div style="padding:18px 20px">${barList(data.topCountries, 'country', 'country')}</div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>Top Email Domains</h2></div>
        <div style="padding:18px 20px">${barList(data.topDomains, 'domain', 'domain')}</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>Tracking Logs</h2>
        <div class="toolbar">
          <input type="text" id="logSearch" placeholder="filter by email or country" style="width:220px" />
          <a href="/api/logs/export?key=${encodeURIComponent(localStorage.getItem(API_KEY_STORAGE)||'')}"><button type="button">Export</button></a>
          <button type="button" style="background:var(--panel-2);border:1px solid var(--line)" onclick="deleteLogs()">Delete Logs</button>
        </div>
      </div>
      <table>
        <thead>
          <tr><th>Time</th><th>IP Address</th><th>Country</th><th>Email</th><th>User Agent</th></tr>
        </thead>
        <tbody id="logsBody"></tbody>
      </table>
    </div>
    <footer>manifest tracking · self-hosted · country data via Vercel edge geo headers</footer>
  `;

  document.getElementById('viewSelect').addEventListener('change', (e) => {
    currentView = e.target.value;
    boot();
  });
  document.getElementById('logSearch').addEventListener('input', (e) => renderLogRows(e.target.value));
  renderLogRows('');
}

function renderLogRows(query){
  const q = query.trim().toLowerCase();
  const filtered = q
    ? allLogs.filter(l => l.email.toLowerCase().includes(q) || l.country.toLowerCase().includes(q))
    : allLogs;
  const body = document.getElementById('logsBody');
  if(!filtered.length){
    body.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="big">No logs</div>Opens will appear here as they happen.</div></td></tr>`;
    return;
  }
  body.innerHTML = filtered.map(l => `
    <tr>
      <td class="count">${fmtDate(l.at)}</td>
      <td class="email-cell">${l.ip || '—'}</td>
      <td class="count">${l.country}</td>
      <td class="email-cell">${l.email}</td>
      <td class="count" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.userAgent}">${l.userAgent}</td>
    </tr>`).join('');
}

async function deleteLogs(){
  if(!confirm('Delete all tracking logs? This cannot be undone.')) return;
  const key = localStorage.getItem(API_KEY_STORAGE) || '';
  await fetch('/api/logs?key=' + encodeURIComponent(key), { method: 'DELETE' });
  boot();
}

function renderAdvanced(data){
  const s = data.summary;
  const app = document.getElementById('app');

  const campaignOptions = ['<option value="">All campaigns</option>']
    .concat(data.campaigns.map(c => `<option value="${c}">${c}</option>`))
    .join('');

  const rows = data.records.length ? data.records.map(r => `
    <tr>
      <td class="email-cell">${r.email}</td>
      <td class="count">${r.campaign}</td>
      <td class="count">${fmtDate(r.sentAt)}</td>
      <td>
        ${r.opened
          ? `<span class="badge opened"><span class="dot"></span>Opened</span>`
          : `<span class="badge pending"><span class="dot"></span>Not opened</span>`}
      </td>
      <td class="count">${r.openCount}</td>
      <td class="count">${r.clickCount}</td>
      <td class="count">${fmtDate(r.lastOpenAt)}</td>
    </tr>`).join('') : `<tr><td colspan="7"><div class="empty"><div class="big">No sends tracked yet</div>Only populated if you use scripts/generate-links.js + manually inserted merge tags — most Belkorchi setups won't use this view.</div></td></tr>`;

  app.innerHTML = `
    <header>
      <div>
        <div class="brand-eyebrow">Manifest · Send Tracking</div>
        <h1>Delivery Log</h1>
      </div>
      <div class="toolbar">
        ${viewToggle()}
        <select id="campaignFilter">${campaignOptions}</select>
        <button onclick="boot()">Refresh</button>
      </div>
    </header>

    <div class="grid">
      ${statCard('Sent', s.totalSent)}
      ${statCard('Opened', s.totalOpened, s.openRate + '% open rate', s.openRate + '%')}
      ${statCard('Clicked', s.totalClicked, s.clickRate + '% click rate')}
      ${statCard('Total Events', s.totalOpenEvents + s.totalClickEvents, s.totalOpenEvents + ' opens · ' + s.totalClickEvents + ' clicks')}
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>Recipients</h2>
        <span class="count">${data.records.length} shown</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Recipient</th><th>Campaign</th><th>Sent</th><th>Status</th>
            <th>Opens</th><th>Clicks</th><th>Last open</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <footer>manifest tracking · self-hosted</footer>
  `;

  document.getElementById('viewSelect').addEventListener('change', (e) => {
    currentView = e.target.value;
    boot();
  });
  document.getElementById('campaignFilter').addEventListener('change', (e) => {
    boot(e.target.value);
  });
}

async function boot(campaign){
  try{
    if(currentView === 'opens'){
      const data = await apiFetch('/api/dashboard');
      renderOpens(data);
    }else{
      const q = campaign ? '/api/stats?campaign=' + encodeURIComponent(campaign) : '/api/stats';
      const data = await apiFetch(q);
      renderAdvanced(data);
    }
  }catch(err){
    if(err.message === 'unauthorized'){
      renderKeyGate();
    }else{
      document.getElementById('app').innerHTML = `<div class="empty" style="margin-top:120px">Couldn't load data. Check the server is running.</div>`;
    }
  }
}

boot();
</script>
</body>
</html>
